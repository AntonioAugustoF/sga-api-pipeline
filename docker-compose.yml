services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      # 5433 no host: evita conflito com o Postgres que você já tem na 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    env_file: .env
    environment:
      # Sobrescreve o .env: dentro da rede do compose, o banco atende
      # pelo nome do serviço ("postgres"), não por localhost.
      DB_HOST: postgres
      DB_PORT: 5432
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  pgdata:
